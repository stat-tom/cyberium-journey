<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720" role="img" aria-labelledby="title desc">
  <title id="title">Spoofing in a user interface</title>
  <desc id="desc">Key questions for spoofing when analyzing a user interface.</desc>
  <defs>
    <style>
      .title { fill: #ffffff; font: 700 42px 'Segoe UI', Arial, sans-serif; }
      .card { fill: #3a356c; }
      .heading { fill: #dfe2ff; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .body { fill: #d7daf5; font: 400 21px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="920" height="720" fill="#150f45"/>
  <text x="18" y="70" class="title">Spoofing</text>

  <rect x="18" y="132" width="430" height="236" rx="10" class="card"/>
  <text x="48" y="188" class="heading">Identity Verification</text>
  <text x="48" y="250" class="body">Can an attacker impersonate</text>
  <text x="48" y="290" class="body">another user through the UI?</text>

  <rect x="472" y="132" width="430" height="236" rx="10" class="card"/>
  <text x="502" y="188" class="heading">Authentication</text>
  <text x="502" y="250" class="body">Weak authentication flows can</text>
  <text x="502" y="290" class="body">lead directly to spoofing.</text>

  <rect x="18" y="400" width="884" height="246" rx="10" class="card"/>
  <text x="48" y="460" class="heading">Threats</text>
  <text x="48" y="522" class="body">Insufficient identity checks are a core spoofing risk.</text>
</svg>