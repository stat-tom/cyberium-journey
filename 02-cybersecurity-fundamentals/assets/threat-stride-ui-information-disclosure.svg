<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="340" viewBox="0 0 1520 340" role="img" aria-labelledby="title desc">
  <title id="title">Information disclosure in a user interface</title>
  <desc id="desc">Information disclosure risks in a user interface: exposed data, weak error handling, and missing encryption.</desc>
  <defs>
    <style>
      .title { fill: #ffffff; font: 700 44px 'Segoe UI', Arial, sans-serif; }
      .heading { fill: #ffffff; font: 700 24px 'Segoe UI', Arial, sans-serif; }
      .body { fill: #d7daf5; font: 400 24px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1520" height="340" fill="#150f45"/>
  <text x="18" y="66" class="title">Information Disclosure</text>

  <text x="18" y="176" class="heading">Exposure Risk</text>
  <text x="18" y="240" class="body">The interface may reveal confidential data.</text>

  <text x="534" y="176" class="heading">Poorly Handled Errors</text>
  <text x="534" y="240" class="body">Detailed failures can leak sensitive information.</text>

  <text x="1050" y="176" class="heading">Missing Encryption</text>
  <text x="1050" y="240" class="body">Data may be intercepted in transit.</text>
</svg>