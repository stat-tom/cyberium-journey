<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Data flows and trust boundaries in an online store</title>
  <desc id="desc">A trust-boundary diagram showing users, frontend, backend, database, and an external payment system.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#202020"/>
    </marker>
    <style>
      .bg { fill: #150f45; }
      .title { fill: #ffffff; font: 700 54px 'Segoe UI', Arial, sans-serif; }
      .zone-untrusted { fill: #fffdfb; stroke: #d45b5b; stroke-width: 3; stroke-dasharray: 12 10; }
      .zone-trusted { fill: #9af29b; stroke: #d45b5b; stroke-width: 3; stroke-dasharray: 12 10; }
      .zone-title { fill: #161616; font: 700 24px 'Segoe UI', Arial, sans-serif; }
      .node { fill: #f7f7f7; stroke: #8c8c8c; stroke-width: 2; rx: 10; }
      .db-top { fill: #f7f7f7; stroke: #8c8c8c; stroke-width: 2; }
      .db-body { fill: #f7f7f7; stroke: #8c8c8c; stroke-width: 2; }
      .label { fill: #252525; font: 400 22px 'Segoe UI', Arial, sans-serif; }
      .node-text { fill: #202020; font: 400 26px 'Segoe UI', Arial, sans-serif; }
      .flow { stroke: #202020; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="860" class="bg"/>
  <text x="40" y="78" class="title">Data Flows</text>

  <rect x="170" y="118" width="370" height="170" class="zone-untrusted"/>
  <text x="190" y="158" class="zone-title">Untrusted zone - Internet</text>
  <rect x="285" y="190" width="180" height="80" class="node"/>
  <text x="375" y="240" text-anchor="middle" class="node-text">User</text>

  <rect x="40" y="430" width="400" height="150" class="zone-untrusted"/>
  <text x="60" y="470" class="zone-title">Untrusted zone - Frontend</text>
  <rect x="250" y="485" width="110" height="70" class="node"/>
  <text x="305" y="528" text-anchor="middle" class="node-text">UI</text>

  <rect x="520" y="365" width="330" height="400" class="zone-trusted"/>
  <text x="540" y="405" class="zone-title">Trusted zone - Backend</text>
  <rect x="630" y="470" width="120" height="80" class="node"/>
  <text x="690" y="520" text-anchor="middle" class="node-text">Server</text>

  <ellipse cx="690" cy="690" rx="95" ry="28" class="db-top"/>
  <rect x="595" y="690" width="190" height="72" class="db-body"/>
  <ellipse cx="690" cy="762" rx="95" ry="28" class="db-top"/>
  <text x="690" y="735" text-anchor="middle" class="node-text">Database</text>

  <rect x="920" y="430" width="230" height="170" class="zone-untrusted"/>
  <text x="940" y="470" class="zone-title">External system</text>
  <rect x="965" y="500" width="145" height="90" class="node"/>
  <text x="1037" y="536" text-anchor="middle" class="node-text">Payment</text>
  <text x="1037" y="568" text-anchor="middle" class="node-text">system</text>

  <path d="M375 270 L375 430 L305 430 L305 485" class="flow"/>
  <text x="395" y="385" class="label">HTTP requests</text>

  <path d="M360 520 L630 510" class="flow"/>
  <text x="452" y="490" class="label">HTTP requests</text>

  <path d="M750 510 L965 545" class="flow"/>
  <text x="794" y="490" class="label">Payment API</text>

  <path d="M690 550 L690 662" class="flow"/>
  <text x="712" y="618" class="label">SQL</text>
</svg>