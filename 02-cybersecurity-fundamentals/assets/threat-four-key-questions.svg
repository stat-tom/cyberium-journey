<svg xmlns="http://www.w3.org/2000/svg" width="860" height="760" viewBox="0 0 860 760" role="img" aria-labelledby="title desc">
  <title id="title">Four key questions in threat modeling</title>
  <desc id="desc">The four classic threat modeling questions.</desc>
  <defs>
    <style>
      .title { fill: #ffffff; font: 700 42px 'Segoe UI', Arial, sans-serif; }
      .numBox { fill: #433d7b; }
      .num { fill: #ffffff; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .question { fill: #dfe2ff; font: 700 28px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="860" height="760" fill="#150f45"/>
  <text x="18" y="68" class="title">Four Key Questions in</text>
  <text x="18" y="120" class="title">Threat Modeling</text>

  <rect x="18" y="236" width="62" height="62" rx="4" class="numBox"/>
  <text x="42" y="278" class="num">1</text>
  <text x="106" y="264" class="question">What are we building?</text>

  <rect x="454" y="236" width="62" height="62" rx="4" class="numBox"/>
  <text x="478" y="278" class="num">2</text>
  <text x="542" y="264" class="question">What can go wrong?</text>

  <rect x="18" y="434" width="62" height="62" rx="4" class="numBox"/>
  <text x="42" y="476" class="num">3</text>
  <text x="106" y="462" class="question">What are we going to</text>
  <text x="106" y="506" class="question">do about it?</text>

  <rect x="454" y="434" width="62" height="62" rx="4" class="numBox"/>
  <text x="478" y="476" class="num">4</text>
  <text x="542" y="462" class="question">Did we do a good</text>
  <text x="542" y="506" class="question">enough job?</text>
</svg>