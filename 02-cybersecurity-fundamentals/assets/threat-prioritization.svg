<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Threat prioritization</title>
  <desc id="desc">A timeline-style diagram showing how high, medium, and recurring threat review priorities are handled.</desc>
  <defs>
    <style>
      .bg { fill: #150f45; }
      .title { fill: #ffffff; font: 700 58px 'Segoe UI', Arial, sans-serif; }
      .line { stroke: #6a6899; stroke-width: 4; }
      .badge { fill: #3a356c; rx: 10; }
      .num { fill: #e7e9ff; font: 700 30px 'Segoe UI', Arial, sans-serif; }
      .heading { fill: #e7e9ff; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .body { fill: #d7daf5; font: 400 23px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="860" class="bg"/>
  <text x="34" y="82" class="title">Threat Prioritization</text>

  <line x1="92" y1="150" x2="92" y2="770" class="line"/>

  <rect x="48" y="182" width="78" height="78" class="badge"/>
  <line x1="126" y1="220" x2="252" y2="220" class="line"/>
  <text x="87" y="232" text-anchor="middle" class="num">1</text>
  <text x="290" y="214" class="heading">High Risk</text>
  <text x="290" y="290" class="body">Immediate attention is required for issues such as</text>
  <text x="290" y="330" class="body">SQL injection or broken authorization.</text>

  <rect x="48" y="410" width="78" height="78" class="badge"/>
  <line x1="126" y1="448" x2="252" y2="448" class="line"/>
  <text x="87" y="460" text-anchor="middle" class="num">2</text>
  <text x="290" y="442" class="heading">Medium and Low Risk</text>
  <text x="290" y="518" class="body">These items still matter, but remediation can be</text>
  <text x="290" y="558" class="body">scheduled according to time and resources.</text>

  <rect x="48" y="640" width="78" height="78" class="badge"/>
  <line x1="126" y1="678" x2="252" y2="678" class="line"/>
  <text x="87" y="690" text-anchor="middle" class="num">3</text>
  <text x="290" y="672" class="heading">Repeat Regularly</text>
  <text x="290" y="748" class="body">Threat modeling should be repeated as the system</text>
  <text x="290" y="788" class="body">changes and new features are introduced.</text>
</svg>