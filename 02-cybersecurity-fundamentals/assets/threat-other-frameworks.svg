      .num { fill: #e7e9ff; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .label { fill: #e7e9ff; font: 700 28px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1400" height="520" class="bg"/>
  <text x="34" y="86" class="title">Other Threat Modeling Frameworks</text>

  <rect x="32" y="170" width="72" height="72" class="badge"/>
