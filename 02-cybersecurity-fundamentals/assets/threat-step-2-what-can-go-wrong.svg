    </style>
  </defs>
  <rect width="1200" height="720" fill="#150f45"/>
  <text x="28" y="82" class="title">Step 2: What Can Go Wrong?</text>

  <rect x="28" y="148" width="338" height="418" rx="12" fill="none"/>
  <rect x="28" y="148" width="338" height="210" rx="6" class="imgA"/>
