  <text x="430" y="428" class="cardTitle">STRIDE Model</text>
  <text x="430" y="484" class="body">Use a structured way to review</text>
  <text x="430" y="524" class="body">common categories of threats.</text>

  <rect x="832" y="148" width="338" height="418" rx="12" fill="none"/>
