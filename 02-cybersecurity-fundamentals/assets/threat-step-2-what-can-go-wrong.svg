<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Step 2: What can go wrong?</title>
  <desc id="desc">Threat modeling step two focuses on identifying threats, using STRIDE, and discussing scenarios as a team.</desc>
  <defs>
