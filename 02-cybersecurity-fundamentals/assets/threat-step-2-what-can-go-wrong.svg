  <circle cx="160" cy="188" r="18" fill="none" stroke="#ff86c2" stroke-width="3"/>
  <text x="151" y="194" fill="#ff86c2" font-family="Segoe UI, Arial, sans-serif" font-size="24">?</text>
  <circle cx="214" cy="222" r="18" fill="none" stroke="#7fb7ff" stroke-width="3"/>
  <text x="205" y="228" fill="#7fb7ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">?</text>
  <path d="M122 310 C150 252 196 244 230 276" stroke="#38a0ff" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="28" y="428" class="cardTitle">Threat Identification</text>
  <text x="28" y="484" class="body">Consider potential problems for each</text>
  <text x="28" y="524" class="body">part of the system.</text>

  <rect x="430" y="148" width="338" height="418" rx="12" fill="none"/>
